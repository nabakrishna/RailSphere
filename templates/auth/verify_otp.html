{% extends "base.html" %}
{% block title %}Verify Email — RailSphere{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-envelope-open-text"></i></div>
      <h1>Check your inbox</h1>
      <p>We sent a 6-digit code to<br/><strong style="color:var(--gray-800)">{{ email }}</strong></p>
    </div>

    <form method="POST" action="{{ url_for('auth.verify_otp') }}">
      <div class="form-group">
        <label class="form-label" style="text-align:center;display:block">Enter verification code</label>
        <input
          type="text"
          name="otp"
          placeholder="000000"
          maxlength="6"
          minlength="6"
          pattern="\d{6}"
          inputmode="numeric"
          autocomplete="one-time-code"
          required
          autofocus
          class="input-mono"
          style="text-align:center;font-size:28px;font-weight:700;letter-spacing:8px;padding:14px 12px"
        />
        <div class="form-hint" style="text-align:center">
          <i class="fas fa-clock" style="font-size:11px"></i> Expires in 10 minutes
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Verify email
      </button>
    </form>

    <div class="divider"></div>

    <form method="POST" action="{{ url_for('auth.resend_otp') }}">
      <button type="submit" class="btn btn-secondary btn-full" style="margin-bottom:14px">
        <i class="fas fa-redo" style="font-size:12px"></i> Resend code
      </button>
    </form>
    <p class="text-muted" style="text-align:center">
      Wrong account? <a href="{{ url_for('auth.register') }}" style="color:var(--blue);font-weight:600">Register again</a>
    </p>
  </div>
</div>
{% endblock %}
