{% extends "base.html" %}
{% block title %}Verify Email — IRCTC Tracker{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-logo">
      <span class="logo-icon">📬</span>
      <h1>Check your email</h1>
      <p>We sent a 6-digit OTP to<br><strong style="color:var(--accent)">{{ email }}</strong></p>
    </div>

    <form method="POST" action="{{ url_for('auth.verify_otp') }}">
      <div class="form-group">
        <label style="text-align:center;display:block;margin-bottom:12px">Enter OTP</label>
        <input
          type="text"
          name="otp"
          placeholder="000000"
          maxlength="6"
          minlength="6"
          pattern="\d{6}"
          inputmode="numeric"
          autocomplete="one-time-code"
          required
          autofocus
          style="
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 10px;
            font-family: monospace;
            padding: 18px 12px;
          "
        />
        <div class="text-muted" style="margin-top:8px;text-align:center;font-size:13px">
          ⏱ Expires in 10 minutes
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
        Verify Email →
      </button>
    </form>

    <div class="divider"></div>

    <p class="text-center text-muted" style="font-size:13px">
      Didn't receive it?
    </p>
    <form method="POST" action="{{ url_for('auth.resend_otp') }}">
      <button type="submit" class="btn btn-full" style="background:var(--surface2);color:var(--text);margin-top:0">
        Resend OTP
      </button>
    </form>

    <p class="text-center text-muted" style="margin-top:16px;font-size:13px">
      Wrong account? <a href="{{ url_for('auth.register') }}" style="color:var(--accent)">Register again</a>
    </p>
  </div>
</div>
{% endblock %}
