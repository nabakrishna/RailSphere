{% extends "base.html" %}
{% block title %}Set New Password — RailWatch{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-lock"></i></div>
      <h1>Set new password</h1>
      <p>Enter the OTP sent to your email and choose a new password</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">OTP Code</label>
        <input
          type="text" name="otp" placeholder="000000"
          maxlength="6" minlength="6" pattern="\d{6}"
          inputmode="numeric" autocomplete="one-time-code"
          required autofocus class="input-mono"
          style="text-align:center;font-size:22px;font-weight:700;letter-spacing:6px;padding:12px"
        />
      </div>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" name="password" placeholder="Min. 8 characters" minlength="8" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input type="password" name="confirm_password" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Update password</button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('auth.login') }}">Back to log in</a>
    </div>
  </div>
</div>
{% endblock %}
