{% extends "base.html" %}
{% block title %}Set New Password — IRCTC Tracker{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🔒</span>
      <h1>Set new password</h1>
      <p>Choose a strong password for your account</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="8+ chars" minlength="8" required autofocus/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Same again" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Update Password →</button>
    </form>
  </div>
</div>
{% endblock %}
