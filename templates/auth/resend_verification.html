{% extends "base.html" %}
{% block title %}Resend Verification — IRCTC Tracker{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">📧</span>
      <h1>Resend verification</h1>
      <p>Enter your email to get a new verification link</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Resend Link →</button>
    </form>
    <div class="divider"></div>
    <p class="text-center text-muted"><a href="{{ url_for('auth.login') }}" style="color:var(--accent)">← Back to login</a></p>
  </div>
</div>
{% endblock %}
