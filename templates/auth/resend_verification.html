{% extends "base.html" %}
{% block title %}Resend Verification — RailSphere{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-paper-plane"></i></div>
      <h1>Resend verification</h1>
      <p>Enter your email to receive a new OTP</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        <i class="fas fa-paper-plane" style="font-size:12px"></i> Send new code
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('auth.login') }}">Back to log in</a>
    </div>
  </div>
</div>
{% endblock %}
