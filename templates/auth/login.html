{% extends "base.html" %}
{% block title %}Log in — RailWatch{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-train"></i></div>
      <h1>Welcome back</h1>
      <p>Log in to your RailWatch account</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email or Username</label>
        <input type="text" name="identifier" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          <span>Password</span>
          <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--blue);font-weight:500;font-size:12px;text-decoration:none">Forgot password?</a>
        </label>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
        <input type="checkbox" name="remember" id="remember" style="width:auto;width:15px;height:15px;accent-color:var(--blue);cursor:pointer"/>
        <label for="remember" style="font-size:13px;color:var(--gray-600);cursor:pointer;font-weight:400">Keep me logged in</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Log in</button>
    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
