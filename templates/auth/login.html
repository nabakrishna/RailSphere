{% extends "base.html" %}
{% block title %}Login — IRCTC Tracker{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🚆</span>
      <h1>Welcome back</h1>
      <p>Log in to your tracker account</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Email or Username</label>
        <input type="text" name="identifier" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-size:13px">
        <label style="text-transform:none;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted)">
          <input type="checkbox" name="remember" style="width:auto;accent-color:var(--accent)"/> Remember me
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--accent)">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login →</button>
    </form>

    <div class="divider"></div>
    <p class="text-center text-muted">
      No account? <a href="{{ url_for('auth.register') }}" style="color:var(--accent)">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
