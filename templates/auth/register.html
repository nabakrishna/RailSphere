{% extends "base.html" %}
{% block title %}Create Account — RailSphere{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
      <h1>Create account</h1>
      <p>Start tracking seats in under a minute</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" placeholder="e.g. rahul_traveller" minlength="3" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
        <div class="form-hint">A 6-digit OTP will be sent here to verify your account.</div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" placeholder="Min. 8 characters" minlength="8" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm_password" placeholder="Repeat password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:4px">
        Create account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
