{% extends "base.html" %}
{% block title %}Create Account — IRCTC Tracker{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:460px">
    <div class="auth-logo">
      <span class="logo-icon">🚆</span>
      <h1>Create account</h1>
      <p>Start tracking seat availability in minutes</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="railfan42" minlength="3" required autofocus/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
        <div class="text-muted" style="margin-top:5px">We'll send a 6-digit OTP here to verify your account.</div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="8+ chars" minlength="8" required/>
        </div>
        <div class="form-group">
          <label>Confirm</label>
          <input type="password" name="confirm_password" placeholder="Again…" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px">Create Account →</button>
    </form>

    <div class="divider"></div>
    <p class="text-center text-muted">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--accent)">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
